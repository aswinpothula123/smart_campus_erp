name: smart_campus_erp
description: "A professional cross-platform Smart Campus ERP Mobile and Web Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
    
  image_picker: ^1.1.2
  path: ^1.9.0

  # Icons Pack
  cupertino_icons: ^1.0.8

  # Unified Core Firebase Configuration Pipeline 
  firebase_core: ^4.1.1
  cloud_firestore: ^6.0.1
  firebase_auth: ^6.0.2
  firebase_storage: ^13.0.1
  firebase_messaging: ^16.0.1

  # High-Performance QR Rendering Vector Core
  qr_flutter: ^4.1.0

  # Hardware Native and Web Text-To-Speech Synthesizer Engine
  flutter_tts: ^4.2.1

  # Cross-Platform Geospatial Web Routing Core Links
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  web: true
  windows: true
  image_path: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/